name: Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build release exe
        run: npm run tauri:build -- --no-bundle

      - name: Package release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -LiteralPath src-tauri/target/release/orvex.exe -Destination release/orvex.exe -Force
          Compress-Archive -Path release/orvex.exe -DestinationPath release/Orvex-windows-x64.zip -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Orvex ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/orvex.exe
            release/Orvex-windows-x64.zip
